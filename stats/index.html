<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartenservice Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: 'oklch(0.985 0.002 247.839)',
                        'bg-dark': 'oklch(14.1% 0.005 285.823)',
                        surface: '#fff',
                        'surface-dark': 'oklch(21% 0.006 285.885)',
                        'text-primary': 'oklch(0.21 0.034 264.665)',
                        'text-primary-dark': 'oklch(0.967 0.001 286.375)',
                        primary: 'oklch(0.546 0.245 262.881)',
                        'primary-dark': 'oklch(0.596 0.145 163.225)',
                        border: 'oklch(0.872 0.01 258.338)',
                        'border-dark': 'oklch(0.274 0.006 286.033)',
                    }
                }
            }
        }
    </script>
    <style>
        @font-face {
            font-family: "Montserrat";
            src: url("../ui/assets/font/Montserrat.woff2") format("woff2");
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }
        body { font-family: 'Montserrat', system-ui, -apple-system, sans-serif; }
        .stat-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .dark .stat-card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .tab-active {
            border-bottom: 2px solid currentColor;
            color: var(--color-primary);
        }
        .dark .tab-active {
            color: var(--color-primary-dark);
        }
        canvas { max-height: 400px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e0d8cf; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #2e2c4a; }
    </style>
</head>
<body class="bg-[oklch(0.985_0.002_247.839)] dark:bg-[oklch(14.1%_0.005_285.823)] text-[oklch(0.21_0.034_264.665)] dark:text-[oklch(0.967_0.001_286.375)] min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold mb-2">Kartenservice Statistiken</h1>
            <p class="text-gray-500 dark:text-gray-400">Visualisierung der Nutzungsdaten deiner Karte</p>
        </header>

        <!-- Login Section -->
        <div id="login-section" class="bg-white dark:bg-[oklch(21%_0.006_285.885)] rounded-xl p-6 mb-8 shadow-sm border border-[oklch(0.872_0.01_258.338)] dark:border-[oklch(0.274_0.006_286.033)]">
            <h2 class="text-xl font-semibold mb-4">Anmeldung</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                Gib deine Karten-Nummer und dein Passwort ein, um deine Statistiken abzurufen.<br>
                Die Anmeldedaten sind dieselben wie auf <a href="https://kartenservice.studentenwerk-leipzig.de" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline">kartenservice.studentenwerk-leipzig.de</a>.
            </p>
            <form id="login-form" class="flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium mb-1">Karten-Nummer</label>
                    <input type="text" id="cardnumber-input" placeholder="36159433000000000" class="w-full px-3 py-2 border border-[oklch(0.872_0.01_258.338)] dark:border-[oklch(0.274_0.006_286.033)] rounded-lg bg-transparent focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium mb-1">Passwort</label>
                    <input type="password" id="password-input" class="w-full px-3 py-2 border border-[oklch(0.872_0.01_258.338)] dark:border-[oklch(0.274_0.006_286.033)] rounded-lg bg-transparent focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="px-6 py-2 bg-[oklch(0.546_0.245_262.881)] dark:bg-[oklch(0.596_0.145_163.225)] text-white rounded-lg font-medium hover:opacity-90 transition-opacity">Laden</button>
            </form>
            <div id="login-error" class="mt-3 text-red-600 dark:text-red-400 text-sm hidden"></div>
        </div>

        <!-- Loading -->
        <div id="loading-section" class="hidden text-center py-12">
            <div class="inline-block w-8 h-8 border-4 border-[oklch(0.872_0.01_258.338)] dark:border-[oklch(0.274_0.006_286.033)] border-t-[oklch(0.546_0.245_262.881)] dark:border-t-[oklch(0.596_0.145_163.225)] rounded-full animate-spin mb-4"></div>
            <p class="text-gray-500 dark:text-gray-400">Lade Statistiken...</p>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-section" class="hidden">
            <!-- Overview Cards -->
            <section class="mb-8">
                <h2 class="text-xl font-semibold mb-4">Übersicht</h2>
                <div id="overview-cards" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
            </section>

            <!-- Tabs -->
            <nav class="flex flex-wrap gap-1 mb-6 border-b border-[oklch(0.872_0.01_258.338)] dark:border-[oklch(0.274_0.006_286.033)] overflow-x-auto" id="tab-nav"></nav>

            <!-- Tab Content -->
            <div id="tab-content"></div>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
